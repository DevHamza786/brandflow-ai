; PBOS development PHP settings
memory_limit = 512M
upload_max_filesize = 64M
post_max_size = 64M
max_execution_time = 300
max_input_time = 300

display_errors = On
display_startup_errors = On
error_reporting = E_ALL

; Realpath cache helps bind-mounted volumes on Docker Desktop
realpath_cache_size = 4096K
realpath_cache_ttl = 600
