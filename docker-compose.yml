# PBOS — local development stack (production-style service split)
# @see docs/PROJECT_ARCHITECTURE.md §9.2
#
# Usage:
#   cp .env.docker.example .env
#   cp apps/api/.env.docker.example apps/api/.env
#   docker compose up -d
#   docker compose --profile tools up -d   # include pgAdmin

name: pbos

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

# Shared Laravel application settings (api, horizon, scheduler)
x-app-build: &app-build
  context: .
  dockerfile: docker/api/Dockerfile
  target: dev

x-app-env: &app-env
  APP_ENV: local
  APP_DEBUG: "true"
  LOG_LEVEL: debug
  DB_CONNECTION: pgsql
  DB_HOST: postgres
  DB_PORT: 5432
  DB_DATABASE: ${POSTGRES_DB:-pbos}
  DB_USERNAME: ${POSTGRES_USER:-pbos}
  DB_PASSWORD: ${POSTGRES_PASSWORD:-pbos_secret}
  REDIS_CLIENT: phpredis
  REDIS_HOST: redis
  REDIS_PORT: 6379
  REDIS_PASSWORD: ${REDIS_PASSWORD:-null}
  CACHE_STORE: redis
  SESSION_DRIVER: redis
  QUEUE_CONNECTION: redis
  RUN_MIGRATIONS: ${RUN_MIGRATIONS:-true}
  RUN_PGVECTOR_MIGRATIONS: ${RUN_PGVECTOR_MIGRATIONS:-true}

x-app-volumes: &app-volumes
  - ./apps/api:/var/www/html
  - ./docker/scripts/wait-for-services.sh:/usr/local/bin/wait-for-services.sh:ro

x-app-depends: &app-depends
  postgres:
    condition: service_healthy
  redis:
    condition: service_healthy

services:

  # ---------------------------------------------------------------------------
  # Data stores
  # ---------------------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg16
    container_name: pbos-postgres
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pbos}
      POSTGRES_USER: ${POSTGRES_USER:-pbos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pbos_secret}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pbos_postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    networks:
      - pbos
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pbos} -d ${POSTGRES_DB:-pbos}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: pbos-redis
    restart: unless-stopped
    logging: *default-logging
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - pbos_redis_data:/data
    networks:
      - pbos
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ---------------------------------------------------------------------------
  # Laravel API (PHP-FPM) + Nginx edge
  # ---------------------------------------------------------------------------
  api:
    build: *app-build
    container_name: pbos-api
    restart: unless-stopped
    logging: *default-logging
    env_file:
      - ./apps/api/.env
    environment:
      <<: *app-env
    volumes: *app-volumes
    depends_on: *app-depends
    networks:
      - pbos
    expose:
      - "9000"
    healthcheck:
      test: ["CMD-SHELL", "pgrep -x php-fpm || pgrep php-fpm"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  nginx:
    image: nginx:1.27-alpine
    container_name: pbos-nginx
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - ./apps/api:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_started
    networks:
      - pbos
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Queue workers (Redis queues via Horizon)
  # ---------------------------------------------------------------------------
  horizon:
    build: *app-build
    container_name: pbos-horizon
    restart: unless-stopped
    logging: *default-logging
    env_file:
      - ./apps/api/.env
    environment:
      <<: *app-env
      RUN_MIGRATIONS: "false"
    volumes: *app-volumes
    depends_on: *app-depends
    networks:
      - pbos
    entrypoint: ["/usr/local/bin/pbos-entrypoint.sh"]
    command: ["php", "artisan", "horizon"]
    healthcheck:
      test: ["CMD-SHELL", "php artisan horizon:status | grep -q running"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ---------------------------------------------------------------------------
  # Laravel scheduler (cron replacement)
  # ---------------------------------------------------------------------------
  scheduler:
    build: *app-build
    container_name: pbos-scheduler
    restart: unless-stopped
    logging: *default-logging
    env_file:
      - ./apps/api/.env
    environment:
      <<: *app-env
      RUN_MIGRATIONS: "false"
    volumes: *app-volumes
    depends_on: *app-depends
    networks:
      - pbos
    entrypoint: ["/usr/local/bin/pbos-entrypoint.sh"]
    command: ["php", "artisan", "schedule:work"]

  # ---------------------------------------------------------------------------
  # Optional tooling (docker compose --profile tools up)
  # ---------------------------------------------------------------------------
  pgadmin:
    profiles: ["tools"]
    image: dpage/pgadmin4:8
    container_name: pbos-pgadmin
    restart: unless-stopped
    logging: *default-logging
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-pbos_admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - pbos_pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - pbos

networks:
  pbos:
    driver: bridge
    name: pbos-network

volumes:
  pbos_postgres_data:
    name: pbos_postgres_data
  pbos_redis_data:
    name: pbos_redis_data
  pbos_pgadmin_data:
    name: pbos_pgadmin_data
